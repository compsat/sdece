<!DOCTYPE html>
<html>
    <head>
        <title>Edit Evacuation Center</title>
        <link rel="stylesheet" href="../css/form.css">
        <link rel="stylesheet" href="../css/main.css">
        <link href="https://fonts.googleapis.com/css?family=Hind" rel='stylesheet'>

        <script type="module">
            import { hasDatabase, getEvacCentersCollection } from '/app_buklod-tao/js/dexie.js'
            document.getElementById("submit_form").addEventListener("click", async function(event) {
                event.preventDefault();

                // Keep your existing validation call here if you have one
                // if (typeof validateRequiredFields === 'function' && !validateRequiredFields()) return;

                const name = document.getElementById('evaccenter_name').value.trim();
                const type = document.getElementById('evaccenter_material').value;
                const latitude = parseFloat(document.getElementById('latitude').value);
                const longitude = parseFloat(document.getElementById('longitude').value);
                const location_link = document.getElementById('location_link').value.trim();

                try {
                    if (!hasDatabase()) {
                        alert("Local database is not ready yet. Please wait a moment and try again.");
                        return;
                    }

                    const editId = document.getElementById('edit_doc_id').value;

                    const formData = {
                        name: name,
                        type: type,
                        latitude: latitude,
                        longitude: longitude,
                        location_link: location_link || null,
                        timestamp: document.getElementById('timestamp').value || new Date().toISOString(),
                        _deleted: false,
                        updatedAt: Date.now()
                    };

                    if (editId) {
                        formData.id = editId;
                        await getEvacCentersCollection().incrementalUpsert(formData);
                        console.log("Evac center updated locally!");
                    } else {
                        formData.id = 'evac_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                        await getEvacCentersCollection().insert(formData);
                        console.log("Evac center added locally!");
                    }
                    
                    console.log("Closing modal.")
                    closeModal(); 
                    
                } catch (err) {
                    console.error("Error saving evac center to local DB:", err);
                    alert("Error saving evacuation center: " + err.message);
                }
            });
        </script>

        <script type="module">
            import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.18.0/firebase-auth.js";
            import { AUTH } from "/js/auth.js";

            const loginURL = "/html/login.html";
            onAuthStateChanged(AUTH, (user) => {
                if (!user) {
                    window.top.location.href = loginURL;
                }
            });
        </script>
    </head>

    <body>
        <div class="modal-container">
            <!-- Modal Header -->
            <div class="modal-header">
                <div>
                    <h1 class="modal-title">Edit Evacuation Center</h1>
                    <p class="modal-subtitle">Update an existing evacuation center</p>
                </div>
                <button type="button" class="close-btn" id="close-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Modal Content -->
            <div class="modal-content">
                <div id="form_error_banner" class="form-banner">
                    <div class="form-banner-title">Please check the form.</div>
                    <p class="form-banner-message"></p>
                </div>
                
                <div class="section">
                    <div class="section-header">
                        <svg class="section-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        <h2 class="section-title">Evacuation Center Information</h2>
                    </div>

                    <div class="form-grid single">
                        <div class="form-group">
                            <label class="form-label" for="evaccenter_name">Evacuation Center Name</label>
                            <input type="text" id="evaccenter_name" name="evaccenter_name" class="form-input" placeholder="Enter evacuation center name" required/>
                            <div class="field-error" id="evaccenter_name_error"></div>
                        </div>
                    </div>
                    <div class="form-grid single">
                        <div class="form-group">
                            <label class="form-label" for="evaccenter_material">Type</label>
                            <select name="evaccenter_material" id="evaccenter_material" class="form-select" required>
                                <option value="" disabled hidden>Select Evacuation Center Type</option>
                                <option value="Evacuation Center">Evacuation Center</option>
                                <option value="Temporary Shelter">Temporary Shelter</option>
                            </select>
                            <div class="field-error" id="evaccenter_material_error"></div>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="latitude">Latitude</label>
                            <input type="text" id="latitude" name="latitude" class="form-input" placeholder="Enter latitude (Ex. 14.67459)" required/>
                            <div class="field-error" id="latitude_error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="longitude">Longitude</label>
                            <input type="text" id="longitude" name="longitude" class="form-input" placeholder="Enter longitude (Ex. 121.11038)" required/>
                            <div class="field-error" id="longitude_error"></div>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="location_link">Location Link</label>
                            <input type="text" id="location_link" name="location_link" class="form-input" placeholder="Enter location link (Ex. https://www.openstreetmap.org/...)" />
                            <button type="button" id="use_current_location" class="btn btn-secondary" style="margin-top: 8px; width: 100%;">Use Current Location</button>
                            <div class="field-error" id="location_link_error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="location_coordinates">
                                <svg style="display: inline; width: 16px; height: 16px; margin-right: 6px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                Location Coordinates
                            </label>
                            <input type="text" id="location_coordinates" name="location_coordinates" class="form-input" readonly />
                        </div>
                    </div>
                    
                    <!-- Hidden fields -->
                    <input type="hidden" id="edit_doc_id" name="edit_doc_id" />
                    <input type="hidden" id="timestamp" name="timestamp" />
                    <input type="hidden" id="source_dataset" name="source_dataset" />
                </div>
            </div>
            
            <!-- Modal Footer -->
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancel_form">Cancel</button>
                <button type="submit" class="btn btn-primary" id="submit_form">Save Changes</button>
            </div>
        </div>

        <script>
            function closeModal() {
                window.parent.postMessage('closeAddModal', '*');
            }

            document.getElementById('close-btn').addEventListener('click', function (event) {
                event.preventDefault();
                closeModal();
            });

            document.getElementById('cancel_form').addEventListener('click', function (event) {
                event.preventDefault();
                closeModal();
            });

            // Auto-fill coordinates from OpenStreetMap link
            document.getElementById('location_link').addEventListener('input', function() {
                const match = this.value.match(/#map=\d+\/([\d.-]+)\/([\d.-]+)/);
                const latInput = document.getElementById('latitude');
                const lngInput = document.getElementById('longitude');
                const coordsInput = document.getElementById('location_coordinates');
                if (match) {
                    latInput.value = match[1];
                    lngInput.value = match[2];
                    coordsInput.value = match[1] + ',' + match[2];
                }
            });

            // Keep the read-only combined coordinates in sync if the user edits lat/lng directly
            function syncCombined() {
                const lat = document.getElementById('latitude').value.trim();
                const lng = document.getElementById('longitude').value.trim();
                document.getElementById('location_coordinates').value = (lat && lng) ? `${lat},${lng}` : '';
            }
            document.getElementById('latitude').addEventListener('input', syncCombined);
            document.getElementById('longitude').addEventListener('input', syncCombined);

            document.getElementById('use_current_location').addEventListener('click', function() {
                const locationButton = this;
                const locationLinkInput = document.getElementById('location_link');
                const locationCoordinatesInput = document.getElementById('location_coordinates');
                const locationLinkError = document.getElementById('location_link_error');

                if (!navigator.geolocation) {
                    locationLinkError.textContent = 'Geolocation is not supported by this browser.';
                    locationLinkError.classList.add('show');
                    return;
                }

                locationButton.disabled = true;
                locationButton.textContent = 'Getting Current Location...';
                locationLinkError.textContent = '';
                locationLinkError.classList.remove('show');

                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude.toFixed(6);
                        const lng = position.coords.longitude.toFixed(6);
                        const osmLink = `https://www.openstreetmap.org/#map=19/${lat}/${lng}`;

                        locationLinkInput.value = osmLink;
                        locationCoordinatesInput.value = `${lat},${lng}`;
                        document.getElementById('latitude').value = lat;
                        document.getElementById('longitude').value = lng;

                        locationButton.disabled = false;
                        locationButton.textContent = 'Use Current Location';
                    },
                    function(error) {
                        let message = 'Unable to get current location.';
                        if (error.code === error.PERMISSION_DENIED) message = 'Location access was denied. Please allow location permission and try again.';
                        else if (error.code === error.POSITION_UNAVAILABLE) message = 'Current location is unavailable right now.';
                        else if (error.code === error.TIMEOUT) message = 'Getting current location timed out. Please try again.';

                        locationLinkError.textContent = message;
                        locationLinkError.classList.add('show');
                        locationButton.disabled = false;
                        locationButton.textContent = 'Use Current Location';
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });

            // Hide error messages when user starts typing
            const inputs = document.querySelectorAll('.form-input, .form-select, .form-textarea');
            inputs.forEach(input => {
                const clear = function() {
                    window.hideFormBanner();
                    
                    this.classList.remove('error');
                    const errorContainer = document.getElementById(`${this.id}_error`);
                    if (errorContainer) {
                        errorContainer.textContent = '';
                        errorContainer.classList.remove('show');
                    }
                    const label = document.querySelector(`label[for="${this.id}"]`);
                    if (label) label.classList.remove('error');
                };
                input.addEventListener('input', clear);
                if (input.tagName === 'SELECT') input.addEventListener('change', clear);
            });
        </script>

        <script>
            // Reusable banner and validation functions
            function getFieldLabel(field) {
                const label = document.querySelector(`label[for="${field.id}"]`);
                return label ? label.textContent.trim() : field.name || field.id;
            }

            function ensureFormBanner() {
                let banner = document.getElementById('form_error_banner');

                if (!banner) {
                    banner = document.createElement('div');
                    banner.id = 'form_error_banner';
                    banner.className = 'form-banner';
                    banner.innerHTML = `
                        <div class="form-banner-title">Please check the form.</div>
                        <p class="form-banner-message"></p>
                    `;

                    const modalContent = document.querySelector('.modal-content');
                    const modalContainer = document.querySelector('.modal-container');

                    if (modalContent) {
                        modalContent.prepend(banner);
                    } else if (modalContainer) {
                        modalContainer.prepend(banner);
                    }
                }

                return banner;
            }

            window.showFormBanner = function(message) {
                const banner = ensureFormBanner();
                banner.querySelector('.form-banner-message').textContent = message;
                banner.classList.add('show');
                banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function hideFormBanner() {
                const banner = document.getElementById('form_error_banner');
                if (banner) {
                    banner.classList.remove('show');
                }
            }

            function clearFieldError(field) {
                field.classList.remove('error');

                const errorContainer = document.getElementById(`${field.id}_error`);
                if (errorContainer) {
                    errorContainer.textContent = '';
                    errorContainer.classList.remove('show');
                }

                const label = document.querySelector(`label[for="${field.id}"]`);
                if (label) {
                    label.classList.remove('error');
                }
            }

            function validateRequiredFields() {
                hideFormBanner();

                const errors = [];

                document.querySelectorAll('[required]').forEach(field => {
                    const value = field.value.trim();

                    if (!value) {
                        const label = getFieldLabel(field);
                        errors.push(label);

                        if (typeof setFieldError === 'function') {
                            setFieldError(field.id, `${label} is required.`);
                        }
                    }
                });

                const contactNumber = document.getElementById('contact_number');
                if (contactNumber && contactNumber.value.trim()) {
                    const pattern = /^(09[0-9]{9}|09[0-9]{2}-[0-9]{3}-[0-9]{4}|N\/A)$/;

                    if (!pattern.test(contactNumber.value.trim())) {
                        errors.push('Contact Number');

                        if (typeof setFieldError === 'function') {
                            setFieldError(
                                'contact_number',
                                'Contact number must be 09XXXXXXXXX, 09XX-XXX-XXXX, or N/A.'
                            );
                        }
                    }
                }

                const material = document.getElementById('household_material');
                const materialOther = document.getElementById('household_material_other');

                if (material && material.value === 'Other' && materialOther && !materialOther.value.trim()) {
                    errors.push('Specify material');

                    if (typeof setFieldError === 'function') {
                        setFieldError('household_material', 'Please specify the house material.');
                    }

                    materialOther.classList.add('error');
                }

                if (errors.length > 0) {
                    window.showFormBanner(`Required or invalid fields: ${errors.join(', ')}`);
                    return false;
                }

                return true;
            }

            document.addEventListener('input', function(event) {
                if (event.target.matches('.form-input, .form-select, .form-textarea')) {
                    clearFieldError(event.target);
                    hideFormBanner();
                }
            });

            document.addEventListener('change', function(event) {
                if (event.target.matches('.form-input, .form-select, .form-textarea')) {
                    clearFieldError(event.target);
                    hideFormBanner();
                }
            });
        </script>

        <script type="module">
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('id');

            if (editId) {
                // Set the hidden ID field
                document.getElementById('edit_doc_id').value = editId;

                if (hasDatabase()) {
                    const doc = await getEvacCentersCollection().findOne(editId).exec();
                    if (doc) {
                        document.getElementById('evaccenter_name').value = doc.name || '';
                        document.getElementById('evaccenter_material').value = doc.type || '';
                        document.getElementById('latitude').value = doc.latitude || '';
                        document.getElementById('longitude').value = doc.longitude || '';
                        document.getElementById('location_link').value = doc.location_link || '';
                        document.getElementById('location_coordinates').value = `${doc.latitude},${doc.longitude}`;
                        document.getElementById('timestamp').value = doc.timestamp || '';
                    }
                }
            }
        </script>
    </body>
</html>
