<!DOCTYPE html>
<html>
    <head>
        <title>Add Evacuation Center</title>
        <link rel="stylesheet" href="../css/form.css">
        <link rel="stylesheet" href="../css/main.css">
        <link href="https://fonts.googleapis.com/css?family=Hind" rel='stylesheet'>
            
        <script type="module">
            //Call function from firestore.js to add new household from input fields after pressing submit button
            import { addEntry, BUKLOD_RULES, setCollection, validateData, getCoordinates } from "/js/firestore_UNIV.js";
            import { submitAddForm } from '../js/firestore.js';

            setCollection("buklod-official");
            document.getElementById("submit_form").addEventListener("click", function() {
                const materialSelect = document.getElementById('household_material');
                if (materialSelect.value === 'Other') {
                    const custom = document.getElementById('household_material_other').value.trim();
                    if (custom) {
                        const tempOption = new Option(custom, custom);
                        materialSelect.add(tempOption);
                        materialSelect.value = custom;
                    }
                }
                submitAddForm();
            });

        </script>

        <script type="module">
            import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.18.0/firebase-auth.js";
            import { AUTH } from "/js/auth.js";

            const loginURL = "/html/login.html";
            onAuthStateChanged(AUTH, (user) => {
                if (!user) {
                    window.top.location.href = loginURL;
                }
            });
        </script>
    </head>
    
    <body>
        <div class="modal-container">
            <!-- Modal Header -->
            <div class="modal-header">
                <div>
                    <h1 class="modal-title">Add Evacuation Center</h1>
                    <p class="modal-subtitle">Register a new evacuation center in the system</p>
                </div>
                <button type="button" class="close-btn" id="close-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Modal Content -->
            <div class="modal-content">
                <!-- Evacuation Center Information Section -->
                <div class="section">
                    <div class="section-header">
                        <svg class="section-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        <h2 class="section-title">Evacuation Center Information</h2>
                    </div>
                    
                    <div class="form-grid single">
                        <div class="form-group">
                            <label class="form-label" for="evaccenter_name">Evacuation Center Name</label>
                            <input type="text" id="evaccenter_name" name="evaccenter_name" class="form-input" placeholder="Enter Evacuation Center name (Ex. DELA CRUZ, Juan)" required/>
                            <div class="field-error" id="evaccenter_name_error"></div>
                        </div>
                    </div>
                        <div class="form-group single">
                            <label class="form-label" for="evaccenter_material">Type</label>
                            <select name="evaccenter_material" id="evaccenter_material" class="form-select" required>
                                <option value="" disabled selected hidden>Select Evacuation Center Type</option>
                                <option value="Evacuation center">Evacuation Center</option>
                                <option value="Temporary shelter">Temporary Shelter</option>
                            </select>
                            <div class="field-error" id="evaccenter_material_error"></div>
                        </div>
                    </div>
                     <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="house_number">Latitude</label>
                            <input type="text" id="house_number" name="house_number" class="form-input" placeholder="Enter house number (Ex. 12B)" />
                            <div class="field-error" id="house_number_error"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="street">Longitude</label>
                            <input type="text" id="street" name="street" class="form-input" placeholder="Enter street name (Ex. Sampaguita St.)" />
                            <div class="field-error" id="street_error"></div>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="location_link">Location Link</label>
                            <input type="text" id="location_link" name="location_link" class="form-input" placeholder="Enter location link (Ex. https://www.openstreetmap.org/ss)" />
                            <button type="button" id="use_current_location" class="btn btn-secondary" style="margin-top: 8px; width: 100%;">Use Current Location</button>
                            <div class="field-error" id="location_link_error"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="location_coordinates">
                                <svg style="display: inline; width: 16px; height: 16px; margin-right: 6px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                Location Coordinates
                            </label>
                            <input type="text" id="location_coordinates" name="location_coordinates" class="form-input" readonly />
                        </div>
                    </div>
                </div>
        
                <!-- Hidden fields -->
                <input type="hidden" id="timestamp" name="timestamp" />
                <input type="hidden" id="source_dataset" name="source_dataset" />

            <!-- Modal Footer -->
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="clear_form">Clear All</button>
                <button type="submit" class="btn btn-primary" id="submit_form">Save Evacuation Center</button>
            </div>
        </div>
        

        

        <script>

            function closeModal() {
                window.parent.postMessage('closeAddModal', '*');
            }

            // Close button handlers
            document.getElementById('close-btn').addEventListener('click', function (event) {
                event.preventDefault();
                console.log('The user has closed the Add Evacuation Center modal.');
                closeModal();
            });

            // Clear all form fields and error states
            function clearForm() {
                document.querySelectorAll('.form-input, .form-textarea').forEach(input => {
                    input.value = '';
                    input.classList.remove('error');
                });
                document.querySelectorAll('.form-select').forEach(select => {
                    select.selectedIndex = 0;
                    select.classList.remove('error');
                });
                document.querySelectorAll('.field-error').forEach(err => {
                    err.textContent = '';
                    err.classList.remove('show');
                });
                document.querySelectorAll('.form-label').forEach(label => {
                    label.classList.remove('error');
                });
            }

            // Auto-fill coordinates from OpenStreetMap link, clear if link is removed
            document.getElementById('location_link').addEventListener('input', function() {
                const match = this.value.match(/#map=\d+\/([\d.-]+)\/([\d.-]+)/);
                if (match) {
                    document.getElementById('location_coordinates').value = match[1] + ',' + match[2];
                } else {
                    document.getElementById('location_coordinates').value = '';
                }
            });

            document.getElementById('use_current_location').addEventListener('click', function() {
                const locationButton = this;
                const locationLinkInput = document.getElementById('location_link');
                const locationCoordinatesInput = document.getElementById('location_coordinates');
                const locationLinkError = document.getElementById('location_link_error');

                if (!navigator.geolocation) {
                    locationLinkError.textContent = 'Geolocation is not supported by this browser.';
                    locationLinkError.classList.add('show');
                    return;
                }

                locationButton.disabled = true;
                locationButton.textContent = 'Getting Current Location...';
                locationLinkError.textContent = '';
                locationLinkError.classList.remove('show');

                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude.toFixed(6);
                        const lng = position.coords.longitude.toFixed(6);
                        const osmLink = `https://www.openstreetmap.org/#map=19/${lat}/${lng}`;

                        locationLinkInput.value = osmLink;
                        locationCoordinatesInput.value = `${lat},${lng}`;

                        locationLinkInput.classList.remove('error');
                        const locationLinkLabel = document.querySelector('label[for="location_link"]');
                        if (locationLinkLabel) {
                            locationLinkLabel.classList.remove('error');
                        }

                        locationButton.disabled = false;
                        locationButton.textContent = 'Use Current Location';
                    },
                    function(error) {
                        let message = 'Unable to get current location.';

                        if (error.code === error.PERMISSION_DENIED) {
                            message = 'Location access was denied. Please allow location permission and try again.';
                        } else if (error.code === error.POSITION_UNAVAILABLE) {
                            message = 'Current location is unavailable right now.';
                        } else if (error.code === error.TIMEOUT) {
                            message = 'Getting current location timed out. Please try again.';
                        }

                        locationLinkError.textContent = message;
                        locationLinkError.classList.add('show');
                        locationButton.disabled = false;
                        locationButton.textContent = 'Use Current Location';
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            });

           

            // Hide error messages when user starts typing
            const inputs = document.querySelectorAll('.form-input, .form-select, .form-textarea');
            inputs.forEach(input => {
                input.addEventListener('input', function() {
                    // Clear error state for this specific field
                    this.classList.remove('error');
                    
                    // Clear error message for this field
                    const errorContainer = document.getElementById(`${this.id}_error`);
                    if (errorContainer) {
                        errorContainer.textContent = '';
                        errorContainer.classList.remove('show');
                    }
                    
                    // Clear error state for the label
                    const label = document.querySelector(`label[for="${this.id}"]`);
                    if (label) {
                        label.classList.remove('error');
                    }
                });
                
                // Also handle change events for select elements
                if (input.tagName === 'SELECT') {
                    input.addEventListener('change', function() {
                        // Clear error state for this specific field
                        this.classList.remove('error');
                        
                        // Clear error message for this field
                        const errorContainer = document.getElementById(`${this.id}_error`);
                        if (errorContainer) {
                            errorContainer.textContent = '';
                            errorContainer.classList.remove('show');
                        }
                        
                        // Clear error state for the label
                        const label = document.querySelector(`label[for="${this.id}"]`);
                        if (label) {
                            label.classList.remove('error');
                        }
                    });
                }
            });
        </script>


    </body> 
</html>
