<!DOCTYPE html>
<html lang="en">
<head>
    <title>Filter</title>
	<link rel="stylesheet" href="/app_seeds/css/filter_modal.css">
</head>
<body>
    
		<div class="filter-header">
			<h2>Filter Partners</h2>
			<button class="filter-close" id="filterClose">&times;</button>
		</div>
		<div class="filter-content">
			<div class="filter-section">
			<h3>Field Name</h3>
			<div class="filter-options">
				<label><input type="checkbox" value="field_option_a" data-filter="field_name"> Field Option A</label>
				<label><input type="checkbox" value="field_option_b" data-filter="field_name"> Field Option B</label>
			</div>
			</div>
			
            <div class="filter-section">
			<h3>Field Name</h3>
			<div class="filter-options">
				<label><input type="checkbox" value="field_option_a" data-filter="field_name"> Field Option A</label>
				<label><input type="checkbox" value="field_option_b" data-filter="field_name"> Field Option B</label>
			</div>
			</div>

		</div>
		<div class="filter-footer">
			<button class="filter-btn filter-clear" id="clearFilters">Clear All</button>
			<button class="filter-btn filter-apply" id="applyFilters">Apply Filters</button>
		</div>

        <!-- SCRIPTS -->
         <script>
            var filterCloseBtn = document.getElementById("filterClose");
            filterCloseBtn.addEventListener("click", function(event) {
              window.parent.postMessage('closeFilterModal', '*');  
            });
         </script>
		
</body>
</html>
