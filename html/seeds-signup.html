<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../css/login.css" rel="stylesheet" />
    <title>Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <main class="auth-page">
      <section class="auth-card" aria-label="Sign up">

        <h1 class="auth-title">Create an account</h1>

        <form class="auth-form" id="signupForm" novalidate>
          <div class="auth-grid-2">
            <div class="auth-field">
              <label for="firstName">First Name</label>
              <input id="firstName" name="firstName" autocomplete="given-name" required />
            </div>

            <div class="auth-field">
              <label for="lastName">Last Name</label>
              <input id="lastName" name="lastName" autocomplete="family-name" required />
            </div>
          </div>

          <div class="auth-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>

          <div class="auth-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required />
          </div>

          <div class="auth-field">
            <label for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="auth-helper">
            <span>Already have an account?</span>
            <a href="./login.html">Log in</a>
          </div>

          <div class="auth-actions">
            <button class="btn btn-primary" type="submit" id="signupButton">Sign Up</button>
          </div>

          <div class="auth-error" id="error" role="alert" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <script type="module">
      import { signUp } from "../js/auth.js";

      const form = document.getElementById("signupForm");
      const errorEl = document.getElementById("error");

      function setError(msg) {
        if (!msg) {
          errorEl.textContent = "";
          errorEl.dataset.show = "false";
          return;
        }
        errorEl.textContent = msg;
        errorEl.dataset.show = "true";
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        setError("");

        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (!firstName || !lastName || !email || !password || !confirmPassword) {
          setError("Please complete all fields.");
          return;
        }

        if (password.length < 6) {
          setError("Password must be at least 6 characters.");
          return;
        }

        if (password !== confirmPassword) {
          setError("Passwords do not match.");
          return;
        }

        try {
          await signUp({ firstName, lastName, email, password });
          window.location.href = "./login.html";
        } catch {
          setError("Error creating account. Please try again.");
        }
      });
    </script>
  </body>
</html>
